naftiko: "1.0.0-alpha1"

info:
  label: "Teledyne FLIR Camera REST API"
  description: "REST API for FLIR automation cameras - thermal images, ROI measurements, and alarm monitoring."
  tags:
    - Teledyne FLIR
    - Thermal Imaging
    - Camera
    - Industrial Automation
    - Machine Vision
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      FLIR_CAMERA_IP: FLIR_CAMERA_IP

capability:
  consumes:
    - type: http
      namespace: flir-camera
      baseUri: "http://{{FLIR_CAMERA_IP}}/api"
      description: "Teledyne FLIR automation camera REST API."
      resources:
        - name: images
          path: /image/current
          description: "Current thermal camera images."
          operations:
            - name: get-current-image
              method: GET
              description: "Retrieve the current thermal image from the camera."
              inputParameters:
                - name: imgformat
                  in: query
                  type: string
                  required: false
                  description: "Image format: JPEG, RJPEG, FLAME, VISIBLE, or FUSION."
              outputRawFormat: binary
              outputParameters:
                - name: image
                  type: string
                  value: "$."
        - name: spot-measurements
          path: /spot
          description: "Spot temperature ROI measurements."
          operations:
            - name: get-spot-measurement
              method: GET
              description: "Get temperature measurement for a spot ROI instance."
              inputParameters:
                - name: instance
                  in: path
                  type: integer
                  required: true
                  description: "Spot ROI instance number."
                - name: tempUnit
                  in: query
                  type: string
                  required: false
                  description: "Temperature unit: C, F, or K."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: box-measurements
          path: /box
          description: "Box region of interest temperature statistics."
          operations:
            - name: get-box-measurement
              method: GET
              description: "Get temperature statistics for a box ROI."
              inputParameters:
                - name: instance
                  in: path
                  type: integer
                  required: true
                  description: "Box ROI instance number."
                - name: tempUnit
                  in: query
                  type: string
                  required: false
                  description: "Temperature unit: C, F, or K."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: line-measurements
          path: /line
          description: "Line profile temperature measurements."
          operations:
            - name: get-line-measurement
              method: GET
              description: "Get temperature profile along a line ROI."
              inputParameters:
                - name: instance
                  in: path
                  type: integer
                  required: true
                  description: "Line ROI instance number."
                - name: tempUnit
                  in: query
                  type: string
                  required: false
                  description: "Temperature unit: C, F, or K."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: alarms
          path: /alarms
          description: "Camera alarm states."
          operations:
            - name: get-all-alarms
              method: GET
              description: "Get all configured alarm states on the camera."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-alarm
              method: GET
              description: "Get state of a specific alarm instance."
              inputParameters:
                - name: instance
                  in: path
                  type: integer
                  required: true
                  description: "Alarm instance number."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: flir-camera-rest
      resources:
        - path: /v1/images/current
          name: current-image
          operations:
            - method: GET
              name: get-current-image
              description: "Get current thermal image from FLIR camera."
              call: "flir-camera.get-current-image"
              with:
                imgformat: "rest.imgformat"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/measurements/spot/{instance}
          name: spot-measurement
          operations:
            - method: GET
              name: get-spot-measurement
              description: "Get spot temperature measurement."
              call: "flir-camera.get-spot-measurement"
              with:
                instance: "rest.instance"
                tempUnit: "rest.tempUnit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/alarms
          name: alarms
          operations:
            - method: GET
              name: get-all-alarms
              description: "Get all camera alarm states."
              call: "flir-camera.get-all-alarms"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: flir-camera-mcp
      transport: http
      tools:
        - name: get-current-thermal-image
          description: "Capture the current thermal image from a FLIR automation camera."
          hints:
            readOnly: true
          call: "flir-camera.get-current-image"
          with:
            imgformat: "tools.imgformat"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-spot-temperature
          description: "Get temperature measurement at a specific spot ROI on the FLIR camera."
          hints:
            readOnly: true
          call: "flir-camera.get-spot-measurement"
          with:
            instance: "tools.instance"
            tempUnit: "tools.tempUnit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-box-temperature-stats
          description: "Get min/max/avg temperature statistics for a box region of interest."
          hints:
            readOnly: true
          call: "flir-camera.get-box-measurement"
          with:
            instance: "tools.instance"
            tempUnit: "tools.tempUnit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-line-temperature-profile
          description: "Get temperature profile along a line ROI on the FLIR camera."
          hints:
            readOnly: true
          call: "flir-camera.get-line-measurement"
          with:
            instance: "tools.instance"
            tempUnit: "tools.tempUnit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-camera-alarms
          description: "Get all configured alarm states on a FLIR automation camera."
          hints:
            readOnly: true
          call: "flir-camera.get-all-alarms"
          outputParameters:
            - type: object
              mapping: "$."
