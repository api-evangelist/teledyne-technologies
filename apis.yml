aid: teledyne-technologies
name: Teledyne Technologies
description: >-
  Teledyne Technologies Incorporated is a leading provider of sophisticated digital imaging products and software,
  instrumentation, aerospace and defense electronics, and engineered systems. Headquartered in Thousand Oaks,
  California, Teledyne serves the defense, commercial, and industrial markets. Key subsidiaries include Teledyne FLIR
  (thermal imaging cameras and systems), Teledyne LeCroy (oscilloscopes and protocol analyzers), Teledyne Imaging
  (scientific and industrial cameras), and Teledyne API (air quality monitoring instruments). Teledyne FLIR provides
  REST APIs and SDKs for thermal camera integration, while Teledyne LeCroy provides ActiveDSO and VISA-based automation
  APIs for test and measurement instruments.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
