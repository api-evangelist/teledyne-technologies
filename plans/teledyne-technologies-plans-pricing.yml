description: Teledyne Technologies sells instruments, cameras, and defense electronics under
  subsidiary brands (FLIR, LeCroy, Imaging, API). SDKs and instrument-control APIs ship as part of
  the underlying hardware purchase or as paid integration toolkits; there is no public consumption
  price list for an independent developer-API product.
sources:
  - https://www.teledyne.com/
  - https://www.flir.com/
  - https://www.teledynelecroy.com/
notes: Teledyne does not operate a unified developer-API product with public per-call pricing. SDK
  licensing is bundled with hardware (e.g. FLIR Spinnaker / Atlas SDK with cameras, ActiveDSO with
  LeCroy oscilloscopes) or sold as integration packages by the relevant subsidiary. The original
  Free / Pro / Enterprise scaffold tiers do not match this commercial model.
plans:
  - id: teledyne-technologies-contact-sales
    name: Contact Sales
    type: enterprise
    description: SDK and API access for Teledyne FLIR, LeCroy, Imaging, and API instrumentation
      products is tied to hardware purchase or paid integration packages negotiated through the
      respective subsidiary's sales channel.
