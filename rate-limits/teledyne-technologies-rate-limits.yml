specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Teledyne Technologies
providerId: teledyne-technologies
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Aerospace
  - Defense
  - Digital Imaging
  - Instrumentation
  - Thermal Imaging
  - Test and Measurement
  - Fortune 500
  - Rate Limiting
description: Teledyne's developer surface is dominated by on-device SDKs (FLIR Spinnaker / Atlas,
  LeCroy ActiveDSO, VISA) that talk directly to instrument hardware. There is no published cloud
  API rate limit because the integration is local-bus / network-direct rather than a public REST
  service.
sources:
  - https://www.teledyne.com/
  - https://www.flir.com/
notes: Teledyne does not publish web-API rate limits. SDK throughput is governed by hardware /
  bus / instrument constraints (USB, GigE Vision, GPIB, LXI, USB-TMC) rather than provider-side
  request quotas.
limits:
  - name: Hardware / Bus Constrained
    scope: instrument
    metric: varies
    limit: see device datasheet
    notes: Effective rates are bounded by the instrument firmware, the connection bus (USB / GigE /
      LXI / GPIB), and the SDK design rather than a cloud-side throttle.
policies:
  - name: SDK-Local Operation
    description: SDKs operate against local or networked instruments; throttling concepts (429,
      Retry-After, etc.) do not apply. Concurrency is bounded by the hardware and the host
      application.
maintainers:
