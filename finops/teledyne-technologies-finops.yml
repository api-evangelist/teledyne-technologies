description: FOCUS-aligned FinOps shape for Teledyne Technologies. Spend is dominated by capital
  hardware purchase and bundled SDK / integration licenses sold through subsidiary brands, not by
  consumption-priced API calls.
sources:
  - https://www.teledyne.com/
  - https://www.flir.com/
notes: Teledyne does not operate a usage-priced API surface. There is no consumption export to map
  to FOCUS columns. Meters below describe instrument units sold and integration-license seats
  rather than API requests.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Teledyne Technologies Incorporated
serviceCategory: Instrumentation / Defense Electronics
billingModel:
  pricingCategory: Capital Purchase + License
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Teledyne Technologies
  ServiceCategory: Instrumentation / Defense Electronics
  ProviderName: Teledyne Technologies
  PublisherName: Teledyne Technologies Incorporated
  InvoiceIssuerName: Teledyne Technologies Incorporated
  BillingCurrency: USD
meters:
  - name: hardware_units
    unit: unit
    aggregation: sum
    dimensions:
      - subsidiary
      - product_line
  - name: sdk_seats
    unit: seat
    aggregation: sum
    dimensions:
      - subsidiary
      - product_line
principles:
  - name: Visibility
    description: Spend is observed through the buyer's procurement / ERP system; Teledyne does not
      provide a usage-cost dashboard for SDK consumption.
  - name: Allocation
    description: Allocation is by subsidiary brand (FLIR, LeCroy, Imaging, API) and project /
      program purchasing the instrument or SDK.
  - name: Optimization
    description: Optimization is procurement-driven (volume discounts, refurbished units, support
      tier selection) rather than runtime consumption-driven.
  - name: Accountability
    description: The hardware-purchasing project owner is the accountable cost owner; integration
      teams own the SDK seats they consume.
maintainers:
